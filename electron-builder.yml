appId: com.grimoire.modmanager
productName: Grimoire
# GameBanana 1-Click Mod Installer protocol registration
protocols:
  - name: Grimoire 1-Click Installer
    schemes:
      - grimoire
# GitHub auto-update configuration
publish:
  provider: github
  owner: Slush97
  repo: grimoire
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - "!node_modules/**/*"
  # Include required runtime dependencies
  - node_modules/adm-zip/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - node_modules/node-7z/**/*
  - node_modules/node-unrar-js/**/*
  - node_modules/7zip-bin/**/*
  - node_modules/cross-spawn/**/*
  - node_modules/shebang-command/**/*
  - node_modules/shebang-regex/**/*
  - node_modules/which/**/*
  - node_modules/isexe/**/*
  - node_modules/path-key/**/*
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/node-unrar-js/**/*
  - node_modules/7zip-bin/**/*
# vpkmerge CLI binary (fetched via scripts/fetch-vpkmerge.mjs) ships outside
# the asar so the OS can execute it directly. Resolved at runtime via
# process.resourcesPath.
extraResources:
  - from: resources/vpkmerge
    to: vpkmerge
    filter:
      - "**/*"
      - "!*.bak"
linux:
  target:
    - AppImage
    - deb
  category: Game
  icon: resources/icon.png
  maintainer: esoc
win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  menuCategory: true
  shortcutName: Grimoire
  uninstallDisplayName: Grimoire Mod Manager
  artifactName: "${productName}-Setup-${version}.${ext}"
portable:
  artifactName: "${productName}-Portable-${version}.${ext}"
