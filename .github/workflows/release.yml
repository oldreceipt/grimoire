name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install

      - name: Clean previous builds
        shell: bash
        run: |
          rm -rf dist release
          mkdir -p release

      - name: Build and package
        id: build
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            pnpm exec electron-vite build && pnpm exec electron-builder --linux --publish never
          else
            pnpm exec electron-vite build && pnpm exec electron-builder --win --publish never
          fi

      - name: List release directory
        if: always()
        shell: bash
        run: |
          echo "=== Release directory contents ==="
          if [ -d "release" ]; then
            ls -la release/
            echo "=== File count ==="
            find release -type f | wc -l
          else
            echo "ERROR: release/ does not exist"
            exit 1
          fi

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release
          # Hash user-facing artifacts only (skip auto-update metadata and blockmaps).
          shopt -s nullglob
          files=(*.exe *.AppImage *.deb)
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: no artifact files found to hash"
            exit 1
          fi
          sha256sum "${files[@]}" > "SHA256SUMS-${{ matrix.platform }}.txt"
          echo "=== SHA256SUMS-${{ matrix.platform }}.txt ==="
          cat "SHA256SUMS-${{ matrix.platform }}.txt"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release/*.exe
            release/*.AppImage
            release/*.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: release/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/ 2>/dev/null || echo "No artifacts"

      - name: Combine per-platform checksums into SHA256SUMS
        shell: bash
        run: |
          cd artifacts
          shopt -s nullglob
          parts=(SHA256SUMS-*.txt)
          if [ ${#parts[@]} -eq 0 ]; then
            echo "ERROR: no per-platform SHA256SUMS files found"
            exit 1
          fi
          cat "${parts[@]}" > SHA256SUMS
          rm "${parts[@]}"
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ inputs.draft || false }}
          generate_release_notes: true
          files: artifacts/*

  aur-publish:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && inputs.draft != true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts

      - name: Compute version and .deb sha256
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DEB="artifacts/grimoire_${VERSION}_amd64.deb"
          if [ ! -f "$DEB" ]; then
            echo "ERROR: $DEB not found in artifacts"
            ls -la artifacts/
            exit 1
          fi
          SHA="$(sha256sum "$DEB" | awk '{print $1}')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION sha=$SHA"

      - name: Setup SSH for AUR
        env:
          AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AUR_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/grimoire-bin.git aur-repo

      - name: Sync PKGBUILD from project and bump version/sha
        shell: bash
        run: |
          cp aur/grimoire-bin/PKGBUILD aur-repo/PKGBUILD
          cd aur-repo
          sed -i "s/^pkgver=.*/pkgver=${{ steps.meta.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s|^sha256sums=.*|sha256sums=('${{ steps.meta.outputs.sha }}')|" PKGBUILD
          echo "=== Updated PKGBUILD ==="
          cat PKGBUILD

      - name: Regenerate .SRCINFO via archlinux container
        shell: bash
        run: |
          docker run --rm -v "$PWD/aur-repo:/pkg:ro" archlinux:latest bash -c '
            {
              useradd -m builder
              cp /pkg/PKGBUILD /tmp/PKGBUILD
              chown builder:builder /tmp/PKGBUILD
            } >&2
            su builder -c "cd /tmp && makepkg --printsrcinfo"
          ' > aur-repo/.SRCINFO
          echo "=== .SRCINFO ==="
          cat aur-repo/.SRCINFO

      - name: Commit and push to AUR
        shell: bash
        run: |
          cd aur-repo
          git config user.name "esocidae"
          git config user.email "slusheliott@gmail.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to push; AUR already matches."
            exit 0
          fi
          git commit -m "Update to ${{ steps.meta.outputs.version }}"
          git push origin master

  apt-publish:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && inputs.draft != true

    permissions:
      contents: write

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Import GPG signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$APT_GPG_PRIVATE_KEY" ]; then
            echo "ERROR: APT_GPG_PRIVATE_KEY secret is not set"
            exit 1
          fi
          # Loopback so reprepro -> gpg works without a tty.
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          printf '%s\n' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')
          if [ -z "$KEY_ID" ]; then
            echo "ERROR: no secret key found after import"
            exit 1
          fi
          echo "GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          echo "Imported signing key: $KEY_ID"

      - name: Check out gh-pages branch (if it exists)
        id: ghpages
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Initialize gh-pages working tree if missing
        if: steps.ghpages.outcome != 'success'
        run: |
          rm -rf gh-pages
          mkdir gh-pages
          cd gh-pages
          git init -b gh-pages
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure reprepro distribution
        run: |
          cd gh-pages
          mkdir -p conf
          cat > conf/distributions <<EOF
          Origin: Grimoire
          Label: Grimoire
          Codename: stable
          Architectures: amd64
          Components: main
          Description: Grimoire apt repository
          SignWith: $GPG_KEY_ID
          EOF

      - name: Compute .deb path
        id: deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DEB="artifacts/grimoire_${VERSION}_amd64.deb"
          if [ ! -f "$DEB" ]; then
            echo "ERROR: $DEB not found"
            ls -la artifacts/
            exit 1
          fi
          echo "path=$DEB" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Add .deb to apt repo (reprepro)
        run: |
          cd gh-pages
          # reprepro refuses to re-include a package of the same version unless
          # we remove it first — safe to ignore the not-present error.
          reprepro --basedir . remove stable grimoire || true
          reprepro --basedir . includedeb stable "../${{ steps.deb.outputs.path }}"

      - name: Export public key
        run: |
          cd gh-pages
          gpg --armor --export "$GPG_KEY_ID" > pubkey.asc

      - name: Write index page
        run: |
          cd gh-pages
          cat > index.html <<'EOF'
          <!doctype html>
          <html lang="en"><head><meta charset="utf-8">
          <title>Grimoire apt repository</title>
          <style>
            body { font: 14px/1.5 system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #ddd; background: #111; }
            pre { background: #1a1a1a; border: 1px solid #333; padding: 1rem; border-radius: 6px; overflow-x: auto; }
            a { color: #8af; }
            h1 { margin-top: 0; }
          </style>
          </head><body>
          <h1>Grimoire apt repository</h1>
          <p>Install Grimoire on Debian/Ubuntu and derivatives:</p>
          <pre>sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://slush97.github.io/grimoire/pubkey.asc \
            | sudo tee /etc/apt/keyrings/grimoire.asc > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/grimoire.asc] https://slush97.github.io/grimoire stable main" \
            | sudo tee /etc/apt/sources.list.d/grimoire.list
          sudo apt update
          sudo apt install grimoire</pre>
          <p>After install, future versions arrive through your normal <code>apt upgrade</code>.</p>
          <p>Source: <a href="https://github.com/Slush97/grimoire">github.com/Slush97/grimoire</a></p>
          </body></html>
          EOF

      - name: Commit and push gh-pages
        run: |
          cd gh-pages
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "Publish ${GITHUB_REF_NAME}"
          git push origin HEAD:gh-pages
